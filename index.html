<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Панель управления ПК</title>
    <style>
        :root {
            --tg-theme-bg: #1c1c1d;
            --tg-theme-text: #ffffff;
            --tg-theme-hint: #aaaaaa;
            --tg-theme-link: #6bb3ff;
            --tg-theme-button: #2e8dfc;
            --tg-theme-button-text: #ffffff;
            --tg-theme-secondary-bg: #262626;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--tg-theme-bg);
            color: var(--tg-theme-text);
            padding: 16px;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .tabs {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--tg-theme-secondary-bg);
            margin-bottom: 16px;
        }
        .tab {
            padding: 8px 16px;
            border-radius: 20px;
            background: var(--tg-theme-secondary-bg);
            color: var(--tg-theme-hint);
            font-size: 14px;
            border: none;
            cursor: pointer;
            white-space: nowrap;
            transition: 0.2s;
        }
        .tab.active {
            background: var(--tg-theme-button);
            color: var(--tg-theme-button-text);
        }
        .content {
            flex: 1;
            overflow-y: auto;
        }
        .panel {
            display: none;
        }
        .panel.active {
            display: block;
        }
        .row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 16px;
        }
        .btn {
            background: var(--tg-theme-button);
            color: var(--tg-theme-button-text);
            border: none;
            border-radius: 12px;
            padding: 12px 16px;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: 0.2s;
        }
        .btn:active { opacity: 0.7; }
        .btn.secondary {
            background: var(--tg-theme-secondary-bg);
            color: var(--tg-theme-text);
        }
        .btn.warn {
            background: #e04f5f;
        }
        .input-group {
            display: flex;
            gap: 8px;
            align-items: center;
            margin-bottom: 12px;
        }
        input[type="text"], input[type="number"] {
            background: var(--tg-theme-secondary-bg);
            color: var(--tg-theme-text);
            border: 1px solid #3a3a3c;
            border-radius: 10px;
            padding: 10px;
            font-size: 14px;
            width: 100%;
            outline: none;
        }
        input[type="range"] {
            width: 100%;
            margin: 8px 0;
        }
        .slider-value {
            text-align: center;
            font-weight: bold;
        }
        .mouse-area {
            background: var(--tg-theme-secondary-bg);
            border-radius: 50%;
            width: 160px;
            height: 160px;
            margin: 0 auto 12px;
            position: relative;
            touch-action: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .joystick-dot {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: var(--tg-theme-button);
            position: relative;
            transition: 0.05s;
        }
        .mouse-buttons {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-bottom: 16px;
        }
        .scroll-buttons {
            display: flex;
            gap: 16px;
            justify-content: center;
        }
        .key-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }
    </style>
</head>
<body>
    <div class="tabs" id="tabs">
        <button class="tab active" data-panel="system">⚙️ Система</button>
        <button class="tab" data-panel="volume">🔊 Звук</button>
        <button class="tab" data-panel="mouse">🖱 Мышь</button>
        <button class="tab" data-panel="keyboard">⌨️ Клавиатура</button>
        <button class="tab" data-panel="other">📦 Другое</button>
    </div>

    <div class="content">
        <!-- Система -->
        <div class="panel active" id="system">
            <div class="row">
                <button class="btn" onclick="send('screenshot')">📸 Скрин</button>
                <button class="btn secondary" onclick="send('video')">🎥 Видео (10с)</button>
            </div>
            <div class="row">
                <button class="btn secondary" onclick="send('status')">📊 Статус</button>
                <button class="btn secondary" onclick="send('topproc')">🚀 Топ процессов</button>
            </div>
            <div class="row">
                <button class="btn secondary" onclick="send('taskmgr')">📊 Диспетчер</button>
                <button class="btn secondary" onclick="send('lock')">🔒 Блокировка</button>
            </div>
            <div class="row">
                <button class="btn secondary" onclick="send('monitoroff')">🖥 Монитор выкл</button>
                <button class="btn secondary" onclick="send('sleep')">💤 Сон</button>
                <button class="btn warn" onclick="send('shutdownnow')">🖥 Выкл ПК</button>
            </div>
            <div class="input-group">
                <input type="number" id="shutdowntimer" placeholder="Минуты" min="1">
                <button class="btn secondary" onclick="sendWithInput('shutdowntimer', 'shutdowntimer|'+(document.getElementById('shutdowntimer').value||'1'))">⏲ Выкл. через</button>
            </div>
            <div class="row">
                <button class="btn secondary" onclick="send('capslock')">🔄 Caps Lock</button>
                <button class="btn secondary" onclick="sendWithInput('site', 'site|'+(prompt('URL:')||'https://google.com'))">🌐 Сайт</button>
            </div>
            <div class="row">
                <button class="btn secondary" onclick="sendWithInput('runprog', 'runprog|'+(prompt('Программа (notepad, calc):')||'notepad'))">🎮 Запуск прогр.</button>
                <button class="btn secondary" onclick="send('wallpaper')">🖼 Случ. обои</button>
            </div>
            <div class="row">
                <button class="btn secondary" onclick="send('windowtitle')">📌 Заголовок окна</button>
                <button class="btn secondary" onclick="send('emptybin')">🧹 Корзина</button>
            </div>
        </div>

        <!-- Звук -->
        <div class="panel" id="volume">
            <div class="slider-value" id="volValue">??%</div>
            <input type="range" id="volumeSlider" min="0" max="100" value="50" onchange="sendVolume(this.value)">
            <div class="row" style="margin-top:12px">
                <button class="btn secondary" onclick="send('volup10')">🔊 +10%</button>
                <button class="btn secondary" onclick="send('voldown10')">🔉 -10%</button>
                <button class="btn" onclick="send('volume_set|50')">🔊 50%</button>
            </div>
            <button class="btn secondary" onclick="send('mute_toggle')" style="width:100%">🔇 Mute / Unmute</button>
            <div class="row" style="margin-top:16px">
                <button class="btn" onclick="send('playpause')">⏯️ Play/Pause</button>
                <button class="btn secondary" onclick="send('nexttrack')">⏭️ Next</button>
            </div>
        </div>

        <!-- Мышь -->
        <div class="panel" id="mouse">
            <div class="mouse-area" id="joystickZone">
                <div class="joystick-dot" id="joystickDot"></div>
            </div>
            <div class="mouse-buttons">
                <button class="btn" onclick="send('mouse_click|left')">🖯 ЛКМ</button>
                <button class="btn secondary" onclick="send('mouse_click|right')">🖰 ПКМ</button>
            </div>
            <div class="scroll-buttons">
                <button class="btn secondary" onclick="send('mouse_scroll|up')">🔄 Скролл ↑</button>
                <button class="btn secondary" onclick="send('mouse_scroll|down')">🔄 Скролл ↓</button>
            </div>
            <div class="row" style="margin-top:16px">
                <button class="btn secondary" onclick="send('findcursor')">🎯 Найти курсор</button>
                <button class="btn secondary" onclick="send('swapmouse')">🖱 Поменять кнопки</button>
            </div>
        </div>

        <!-- Клавиатура -->
        <div class="panel" id="keyboard">
            <div class="input-group">
                <input type="text" id="typeText" placeholder="Текст для вставки">
                <button class="btn" onclick="sendWithInput('type', 'type|'+(document.getElementById('typeText').value||''))">⌨ Вставить</button>
            </div>
            <div class="input-group">
                <input type="text" id="hotkeyText" placeholder="Напр.: alt+tab">
                <button class="btn secondary" onclick="sendWithInput('hotkey', 'hotkey|'+(document.getElementById('hotkeyText').value||''))">⌨ Горячие</button>
            </div>
            <div class="key-grid">
                <button class="btn secondary" onclick="send('keypress|enter')">Enter</button>
                <button class="btn secondary" onclick="send('keypress|backspace')">Backspace</button>
                <button class="btn secondary" onclick="send('keypress|space')">Пробел</button>
                <button class="btn secondary" onclick="send('keypress|escape')">Esc</button>
                <button class="btn secondary" onclick="send('keypress|tab')">Tab</button>
                <button class="btn secondary" onclick="send('keypress|up')">↑</button>
                <button class="btn secondary" onclick="send('keypress|left')">←</button>
                <button class="btn secondary" onclick="send('keypress|down')">↓</button>
                <button class="btn secondary" onclick="send('keypress|right')">→</button>
                <button class="btn secondary" onclick="send('keypress|f5')">F5</button>
                <button class="btn secondary" onclick="send('hotkey|ctrl+c')">Копировать</button>
                <button class="btn secondary" onclick="send('hotkey|ctrl+v')">Вставить</button>
                <button class="btn secondary" onclick="send('minimizeall')">Свернуть все</button>
            </div>
        </div>

        <!-- Другое -->
        <div class="panel" id="other">
            <div class="row">
                <button class="btn secondary" onclick="send('joke')">😂 Шутка</button>
                <button class="btn secondary" onclick="send('genpass')">🔐 Пароль</button>
            </div>
            <div class="input-group">
                <input type="text" id="noteText" placeholder="Текст заметки">
                <button class="btn" onclick="sendWithInput('note', 'note|'+(document.getElementById('noteText').value||''))">📝 Заметка</button>
            </div>
            <div class="input-group">
                <input type="text" id="ttsText" placeholder="Озвучить текст">
                <button class="btn secondary" onclick="sendWithInput('tts', 'tts|'+(document.getElementById('ttsText').value||''))">🎤 Голос</button>
            </div>
            <div class="row">
                <button class="btn secondary" onclick="send('clipboard')">📋 Буфер</button>
                <button class="btn" onclick="send('webcam')">📸 Камера</button>
            </div>
            <div class="input-group">
                <input type="text" id="killProc" placeholder="Имя процесса">
                <button class="btn warn" onclick="sendWithInput('kill', 'kill|'+(document.getElementById('killProc').value||''))">🛑 Убить</button>
            </div>
            <div class="input-group">
                <input type="text" id="notifyTitle" placeholder="Заголовок">
                <input type="text" id="notifyMsg" placeholder="Текст">
                <button class="btn secondary" onclick="sendWithInput('notify', 'notify|'+(document.getElementById('notifyTitle').value||'')+'|'+(document.getElementById('notifyMsg').value||''))">🔔 Уведомить</button>
            </div>
            <div class="row">
                <button class="btn secondary" onclick="send('ipinfo')">🌐 IP Инфо</button>
                <button class="btn secondary" onclick="send('usd')">💱 Курс USD</button>
            </div>
            <div class="input-group">
                <input type="text" id="pingHost" placeholder="Адрес (8.8.8.8)">
                <button class="btn secondary" onclick="sendWithInput('ping', 'ping|'+(document.getElementById('pingHost').value||'8.8.8.8'))">🧭 Пинг</button>
            </div>
            <div class="input-group">
                <input type="text" id="tracertHost" placeholder="Адрес">
                <button class="btn secondary" onclick="sendWithInput('tracert', 'tracert|'+(document.getElementById('tracertHost').value||'google.com'))">🌍 Трассировка</button>
            </div>
            <div class="row">
                <button class="btn secondary" onclick="send('temp')">📂 Temp</button>
                <button class="btn secondary" onclick="send('appdata')">📁 AppData</button>
                <button class="btn secondary" onclick="send('downloads')">📁 Загрузки</button>
            </div>
            <div class="row">
                <button class="btn secondary" onclick="send('invert')">😈 Инверсия</button>
                <button class="btn secondary" onclick="send('restartexp')">🔄 Перезапуск проводника</button>
            </div>
            <div class="input-group">
                <input type="number" id="delscrSec" placeholder="Секунды">
                <button class="btn secondary" onclick="sendWithInput('delscr', 'delscr|'+(document.getElementById('delscrSec').value||'5'))">🕹 Снимок через</button>
            </div>
        </div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand(); // раскрыть на весь экран

        // Переключение вкладок
        document.querySelectorAll('.tab').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById(btn.dataset.panel).classList.add('active');
            });
        });

        // Отправка команды боту (после вызова Mini App закроется)
        function send(command) {
            if (tg && tg.sendData) {
                tg.sendData(command);
            } else {
                alert('Команда: ' + command); // fallback при отладке вне Telegram
            }
        }

        // Отправка с предварительной подготовкой значения из инпута
        function sendWithInput(fieldId, commandTemplate) {
            // commandTemplate уже содержит подставленное значение, либо собираем здесь
            send(commandTemplate);
        }

        // Слайдер громкости
        const volSlider = document.getElementById('volumeSlider');
        const volValue = document.getElementById('volValue');
        volValue.textContent = volSlider.value + '%';
        function sendVolume(val) {
            volValue.textContent = val + '%';
            send('volume_set|' + val);
        }

        // ----- Джойстик мыши -----
        const zone = document.getElementById('joystickZone');
        const dot = document.getElementById('joystickDot');
        let active = false;
        let startX, startY;

        function handleStart(e) {
            e.preventDefault();
            const touch = e.touches ? e.touches[0] : e;
            const rect = zone.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            startX = touch.clientX;
            startY = touch.clientY;
            active = true;
            dot.style.transform = 'translate(0px,0px)';
        }

        function handleMove(e) {
            if (!active) return;
            e.preventDefault();
            const touch = e.touches ? e.touches[0] : e;
            const rect = zone.getBoundingClientRect();
            const maxRadius = rect.width / 2 - 15;
            let dx = touch.clientX - startX;
            let dy = touch.clientY - startY;
            const dist = Math.sqrt(dx*dx + dy*dy);
            if (dist > maxRadius) {
                dx = (dx / dist) * maxRadius;
                dy = (dy / dist) * maxRadius;
            }
            dot.style.transform = `translate(${dx}px, ${dy}px)`;
        }

        function handleEnd(e) {
            if (!active) return;
            active = false;
            const rect = zone.getBoundingClientRect();
            const maxRadius = rect.width / 2;
            let finalDx = 0, finalDy = 0;
            // используем последнее положение dot относительно центра
            const style = window.getComputedStyle(dot);
            const matrix = new DOMMatrixReadOnly(style.transform);
            const tx = matrix.m41; // translateX
            const ty = matrix.m42;
            // масштабируем перемещение (чем больше смещение, тем быстрее двигается курсор)
            const sensitivity = 2.5;
            const moveX = Math.round(tx * sensitivity);
            const moveY = Math.round(ty * sensitivity);
            if (moveX !== 0 || moveY !== 0) {
                send(`mouse_move|${moveX},${moveY}`);
            }
            dot.style.transform = 'translate(0px,0px)';
        }

        zone.addEventListener('touchstart', handleStart, {passive: false});
        zone.addEventListener('touchmove', handleMove, {passive: false});
        zone.addEventListener('touchend', handleEnd);
        zone.addEventListener('touchcancel', handleEnd);
        // поддержка мыши для десктопа
        zone.addEventListener('mousedown', handleStart);
        window.addEventListener('mousemove', (e) => {
            if (active) handleMove(e);
        });
        window.addEventListener('mouseup', handleEnd);
    </script>
</body>
</html>
